<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>IOS CLI Simulator — WebAssembly Engine Test</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body { background: #0d1117; color: #c9d1d9; font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Helvetica, Arial, sans-serif; display: flex; flex-direction: column; height: 100vh; }
  .header { padding: 12px 20px; background: #161b22; border-bottom: 1px solid #30363d; display: flex; align-items: center; gap: 12px; }
  .header h1 { font-size: 15px; color: #f0f6fc; font-weight: 600; }
  .badge { background: #238636; color: #fff; font-size: 10px; padding: 2px 8px; border-radius: 10px; font-weight: 600; }
  .status { font-size: 12px; color: #8b949e; margin-left: auto; }
  .status.ready { color: #3fb950; }
  .status.loading { color: #d29922; }
  .tabs { display: flex; background: #161b22; border-bottom: 1px solid #21262d; padding: 0 12px; }
  .tab { padding: 8px 16px; font-size: 13px; color: #8b949e; cursor: pointer; border-bottom: 2px solid transparent; }
  .tab.active { color: #58a6ff; border-bottom-color: #58a6ff; }
  .tab:hover { color: #c9d1d9; }
  .terminal { flex: 1; overflow-y: auto; padding: 12px 16px; font-family: 'SF Mono', 'Fira Code', 'Cascadia Code', monospace; font-size: 13px; line-height: 1.5; }
  .terminal .line { white-space: pre-wrap; word-break: break-all; }
  .terminal .err { color: #f85149; }
  .terminal .warn { color: #d29922; }
  .terminal .info { color: #58a6ff; }
  .input-row { display: flex; align-items: center; padding: 8px 16px; background: #161b22; border-top: 1px solid #30363d; }
  .prompt { font-family: 'SF Mono', 'Fira Code', monospace; font-size: 13px; color: #3fb950; margin-right: 4px; white-space: nowrap; }
  .input-row input { flex: 1; background: transparent; border: none; color: #c9d1d9; font-family: 'SF Mono', 'Fira Code', monospace; font-size: 13px; outline: none; }
  .info-bar { padding: 8px 20px; background: #161b22; border-top: 1px solid #30363d; font-size: 11px; color: #484f58; display: flex; gap: 20px; }
  .info-bar span { color: #8b949e; }
</style>
</head>
<body>

<div class="header">
  <h1>Cisco IOS XE Simulator</h1>
  <span class="badge">WASM</span>
  <span class="status loading" id="status">Loading WASM engine...</span>
</div>

<div class="tabs" id="tabs">
  <div class="tab active" data-dev="r1">R1</div>
  <div class="tab" data-dev="r2">R2</div>
  <div class="tab" data-dev="pc1">PC1</div>
  <div class="tab" data-dev="pc2">PC2</div>
</div>

<div class="terminal" id="terminal"></div>

<div class="input-row">
  <span class="prompt" id="prompt">R1&gt;</span>
  <input type="text" id="cmd-input" autofocus autocomplete="off" spellcheck="false" placeholder="Type IOS commands here...">
</div>

<div class="info-bar">
  <div>Engine: <span id="engine-info">loading...</span></div>
  <div>WASM: <span id="wasm-size">—</span></div>
  <div>Commands: <span id="cmd-count">0</span></div>
</div>

<script src="dist/ios-engine.js"></script>
<script>
(async function() {
  const CELL = 'wasm-test';
  let activeDev = 'r1';
  let engine = null;
  let cmdCount = 0;

  const terminal = document.getElementById('terminal');
  const input = document.getElementById('cmd-input');
  const promptEl = document.getElementById('prompt');
  const statusEl = document.getElementById('status');

  function appendLine(text, cls) {
    const div = document.createElement('div');
    div.className = 'line' + (cls ? ' ' + cls : '');
    div.textContent = text;
    terminal.appendChild(div);
    terminal.scrollTop = terminal.scrollHeight;
  }

  appendLine('Initializing WebAssembly IOS engine...', 'info');

  try {
    engine = await IOSEngineModule();
    statusEl.textContent = 'Engine ready';
    statusEl.className = 'status ready';
    document.getElementById('engine-info').textContent = 'C++/WASM (Embind)';

    // Initialize topology
    const topo = {
      r1: [
        { name: 'GigabitEthernet0/0', ip: '192.168.1.1', mask: '255.255.255.0' },
        { name: 'Serial0/0/0', ip: '', mask: '' }
      ],
      r2: [
        { name: 'GigabitEthernet0/0', ip: '192.168.2.1', mask: '255.255.255.0' },
        { name: 'Serial0/0/0', ip: '', mask: '' }
      ]
    };
    const links = [{ r1: 'r1', iface1: 'Serial0/0/0', r2: 'r2', iface2: 'Serial0/0/0' }];

    engine.initTopology(['r1', 'r2'], ['pc1', 'pc2'], topo, links);
    engine.createDevice(CELL, 'r1');
    engine.createDevice(CELL, 'r2');
    engine.createPC(CELL, 'pc1');
    engine.createPC(CELL, 'pc2');

    appendLine('', '');
    appendLine('IOS CLI Simulator — WebAssembly Engine', 'info');
    appendLine('Type Cisco IOS commands. Try: enable, show version, configure terminal', 'info');
    appendLine('', '');

    updatePrompt();
  } catch(e) {
    statusEl.textContent = 'Error: ' + e.message;
    appendLine('Failed to load WASM engine: ' + e.message, 'err');
    return;
  }

  function updatePrompt() {
    const devId = CELL + '_' + activeDev;
    const isPc = activeDev.startsWith('pc');
    if (isPc) {
      promptEl.textContent = (activeDev === 'pc1' ? 'PC1' : 'PC2') + '>';
    } else {
      promptEl.textContent = engine.getPrompt(devId);
    }
  }

  function runCommand(cmd) {
    const devId = CELL + '_' + activeDev;
    const isPc = activeDev.startsWith('pc');

    appendLine(promptEl.textContent + ' ' + cmd, '');

    let result;
    if (isPc) {
      result = engine.handlePcCmd(devId, cmd);
    } else {
      result = engine.handleCmd(devId, cmd);
    }

    for (let i = 0; i < result.size(); i++) {
      const line = result.get(i);
      appendLine(line.text, line.cls);
    }
    result.delete(); // prevent Embind memory leak

    cmdCount++;
    document.getElementById('cmd-count').textContent = cmdCount;
    updatePrompt();
  }

  // Input handler
  input.addEventListener('keydown', function(e) {
    if (e.key === 'Enter') {
      const cmd = input.value;
      input.value = '';
      if (cmd.trim()) runCommand(cmd);
    }
  });

  // Tab switching
  document.getElementById('tabs').addEventListener('click', function(e) {
    const tab = e.target.closest('.tab');
    if (!tab) return;
    document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
    tab.classList.add('active');
    activeDev = tab.dataset.dev;
    terminal.innerHTML = '';
    appendLine('--- Switched to ' + activeDev.toUpperCase() + ' ---', 'info');
    updatePrompt();
    input.focus();
  });

  input.focus();
})();
</script>
</body>
</html>
